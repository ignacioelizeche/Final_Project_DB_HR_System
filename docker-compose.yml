version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hr_db
    environment:
      POSTGRES_USER: hr_admin
      POSTGRES_PASSWORD: hr_password
      POSTGRES_DB: hr_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: 
      context: ./backend
    container_name: hr_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://hr_admin:hr_password@db:5432/hr_system
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: 
      context: ./frontend
    container_name: hr_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    command: npm run dev

volumes:
  postgres_data:
